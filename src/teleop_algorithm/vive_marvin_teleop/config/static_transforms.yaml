# Chest Mount TF Configuration
# TF chain: chest -> {side}_chest_base (shared + rotation) -> {side}_chest (local)

chest_mount:
  # Shared translation (chest frame)
  shared:
    x: 0.0
    y: -0.1
    z: 0.12

  left:
    # Rotation (radians)
    roll: -1.5708
    pitch: 0.0
    yaw: 1.5708
    # Local translation (left_chest_base frame)
    local_x: 0.0
    local_y: 0.0
    local_z: 0.037

  right:
    roll: 1.5708
    pitch: 0.0
    yaw: 1.5708
    local_x: 0.0
    local_y: 0.0
    local_z: 0.037

