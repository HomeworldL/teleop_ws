vive_marvin_teleop:
  control_rate_hz: 60.0
  auto_enable: false

  feedback_timeout_sec: 0.5
  tf_timeout_sec: 0.5

  left_feedback_topic: "/marvin/left/joint_states"
  right_feedback_topic: "/marvin/right/joint_states"
  left_command_topic: "/marvin/left/joint_commands"
  right_command_topic: "/marvin/right/joint_commands"

  left_reference_frame: "left_chest"
  right_reference_frame: "right_chest"
  left_target_frame: "tianji_left"
  right_target_frame: "tianji_right"

  left_joint_names: ["Joint1_L", "Joint2_L", "Joint3_L", "Joint4_L", "Joint5_L", "Joint6_L", "Joint7_L"]
  right_joint_names: ["Joint1_R", "Joint2_R", "Joint3_R", "Joint4_R", "Joint5_R", "Joint6_R", "Joint7_R"]

  zsp_type: 1
  left_zsp_para: [0.0, -1.0, -0.5, 0.0, 0.0, 0.0]
  right_zsp_para: [0.0, 1.0, -0.5, 0.0, 0.0, 0.0]
  zsp_angle_deg: 0.0
  singular_tolerance_deg: [5.0, 5.0, 5.0]

  max_joint_step_rad: 0.02
  command_publish_on_change_only: false
